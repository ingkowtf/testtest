<!DOCTYPE html>
<html lang="th">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
margin:0;
font-family:sans-serif;
background:#f5f5f5;
}

/* 3D viewer */

.viewer{
width:100%;
height:80vh;
background:black;
}

/* info box */

.info-panel{
background:white;
border-radius:25px 25px 0 0;
padding:25px;
margin-top:-10px;
}

/* text */

h1{
margin-top:0;
}

p{
line-height:1.6;
}

</style>

</head>

<body>

<div class="viewer">

<model-viewer
src="green_curry.glb"
ios-src="green_curry.usdz"
ar
camera-controls
auto-rotate
style="width:100%;height:100%;">
</model-viewer>

</div>

<div class="info-panel">

<h1>แกงเขียวหวาน (Green Curry)</h1>

<h2>Description</h2>

<p>
แกงเขียวหวานเป็นอาหารไทยประเภทแกงกะทิที่มีรสหวาน เผ็ด
และหอมจากพริกแกงเขียวหวาน
</p>

<h2>Origin</h2>

<p>
มีต้นกำเนิดในประเทศไทยตั้งแต่สมัยรัตนโกสินทร์ตอนต้น
</p>

<h2>Ingredients</h2>

<p>
กะทิ พริกแกงเขียวหวาน ไก่ มะเขือ ใบโหระพา
</p>

</div>

</body>
</html>
